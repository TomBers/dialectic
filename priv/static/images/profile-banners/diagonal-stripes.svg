<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#064e3b"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <pattern id="stripes" width="120" height="120" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect width="120" height="120" fill="transparent"/>
      <rect x="0" width="34" height="120" fill="#d1fae5" opacity="0.28"/>
      <rect x="54" width="14" height="120" fill="#ecfdf5" opacity="0.20"/>
      <rect x="88" width="22" height="120" fill="#022c22" opacity="0.16"/>
    </pattern>
  </defs>
  <rect width="1600" height="420" fill="url(#bg)"/>
  <rect width="1600" height="420" fill="url(#stripes)"/>
</svg>
